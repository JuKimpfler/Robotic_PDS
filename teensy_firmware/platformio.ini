; ============================================================
;  Power Debug System — Teensy 4.0 PlatformIO Konfiguration
; ============================================================
[env:teensy40]
platform  = teensy
board     = teensy40
framework = arduino

monitor_speed   = 115200
upload_protocol = teensy-cli

; Registriert zusaetzliche "Custom Targets" (Build+BT-Upload Node1/2/beide),
; sichtbar im PlatformIO-Sidebar unter Project Tasks -> teensy40 -> Custom.
extra_scripts   = post:extra_script.py

build_flags =
    -DUSB_SERIAL          ; USB als serielle Schnittstelle
    -O2                   ; Optimierungsstufe 2
    -DACTIVE_CHANNELS=200 ; Anzahl aktiver Datenkanäle (anpassbar)
