# bridge.conf — SPI-UDP Bridge Configuration
# Used by spi_bridge daemon on the Raspberry Pi Zero 2W.
# All values are overridable via CLI flags.

# Destination PC IP (Windows Mobile Hotspot gateway — always 192.168.137.1)
host = 192.168.137.1

# UDP port on the PC backend
port = 9000

# SPI device node
spi_device = /dev/spidev0.0

# SPI clock speed in Hz (30 MHz)
spi_speed = 30000000

# GPIO chip device for Teensy IRQ pin
gpio_chip = /dev/gpiochip0

# GPIO line number (BCM numbering) connected to Teensy IRQ output pin
gpio_line = 17
