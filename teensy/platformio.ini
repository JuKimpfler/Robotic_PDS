; PlatformIO Project Configuration
; Telemetry Streaming System — Teensy 4.0 Firmware

[env:teensy40]
platform  = teensy
board     = teensy40
framework = arduino

; USB Serial for rate control commands
build_flags =
    -DUSB_SERIAL
    -DLAYOUT_US_ENGLISH

; Libraries
lib_deps =
    ; SPISlave_T4 — DMA-capable SPI slave driver for Teensy 4.x
    https://github.com/tonton81/SPISlave_T4.git

[env:teensy40_simulate]
extends = env:teensy40
build_flags =
    ${env:teensy40.build_flags}
    -DSIMULATE

monitor_speed = 115200
